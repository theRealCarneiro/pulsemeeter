name: Publish stable release on AUR

on:
  # release:
  #   types: [published]
  workflow_dispatch:

jobs:

  aur-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare PKGBUILD
        run: |
          # Version is single-sourced from pulsemeeter.settings.VERSION
          VERSION="$(grep -oP "^VERSION\s*=\s*'\K[^']+" src/pulsemeeter/settings.py)"
          echo "Publishing pulsemeeter $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          cp packaging/aur/stable/PKGBUILD PKGBUILD
          # Only the version is injected; checksums are regenerated by updpkgsums below
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          cat PKGBUILD

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: pulsemeeter
          pkgbuild: ./PKGBUILD
          updpkgsums: true
          test: true
          test_flags: --clean --cleanbuild --syncdeps --noconfirm
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ env.VERSION }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
