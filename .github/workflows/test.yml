name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$GITHUB_WORKSPACE/src" >> $GITHUB_ENV

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y pulseaudio libgirepository-2.0-dev python3-gi gobject-introspection gir1.2-gtk-3.0 libcairo2-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r dev-requirements.txt

    - name: Start PulseAudio
      run: |
        pulseaudio --start --exit-idle-time=-1
        pactl info

    # Coverage is informational, but the step still fails the build if any test fails
    - name: Run tests
      run: pytest tests/ -v --cov=src/pulsemeeter --cov-report=term-missing
